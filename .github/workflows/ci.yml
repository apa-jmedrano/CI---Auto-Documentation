name: PR Tests And Errors

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-and-check-errors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore tests/StringUtils.Tests.csproj

      - name: Build solution
        run: dotnet build tests/StringUtils.Tests.csproj --configuration Release --no-restore --verbosity minimal

      - name: Run tests when present
        run: dotnet test tests/StringUtils.Tests.csproj --configuration Release --no-build --verbosity minimal
