name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore tests/StringUtils.Tests.csproj

      - name: Run tests
        run: dotnet test tests/StringUtils.Tests.csproj --configuration Release --no-restore --verbosity minimal
