name: Main Documentation

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  document-application:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate application documentation via OpenAI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, urllib.request

          api_key = os.environ["OPENAI_API_KEY"]
          head_sha = os.environ.get("HEAD_SHA", "HEAD")

          repo_tree = subprocess.run(
              ["git", "ls-tree", "-r", "--name-only", head_sha],
              capture_output=True, text=True
          ).stdout

          readme = ""
          if os.path.exists("README.md"):
              with open("README.md", "r") as readme_file:
                  readme = readme_file.read()

          src_snapshot = subprocess.run(
              ["git", "grep", "-n", "", "--", "src", "tests"],
              capture_output=True, text=True
          ).stdout[:15000]

          system_prompt = open(".codex/prompts/system-doc.prompt.md").read()

          payload = json.dumps({
              "model": "gpt-4o-mini",
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {
                      "role": "user",
                      "content": f"Repository files:\n{repo_tree}\n\nREADME:\n{readme}\n\nSource snapshot:\n{src_snapshot}"
                  }
              ]
          }).encode()

          request = urllib.request.Request(
              "https://api.openai.com/v1/chat/completions",
              data=payload,
              headers={
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
          )

          with urllib.request.urlopen(request, timeout=60) as response:
              content = json.loads(response.read())["choices"][0]["message"]["content"]

          os.makedirs("docs", exist_ok=True)
          with open("docs/APP_DOCUMENTATION.md", "w") as output_file:
              output_file.write(content)
          print("docs/APP_DOCUMENTATION.md written.")
          PYEOF

      - name: Commit generated application documentation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update application documentation"
          file_pattern: docs/APP_DOCUMENTATION.md
