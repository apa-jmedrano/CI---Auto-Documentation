name: PR Grade

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  grade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore tests/StringUtils.Tests.csproj

      - name: Run tests
        id: tests
        continue-on-error: true
        run: dotnet test tests/StringUtils.Tests.csproj --configuration Release --no-restore --verbosity minimal

      - name: Score and comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TEST_STATUS: ${{ steps.tests.outcome }}
        with:
          script: |
            const testStatus = process.env.TEST_STATUS;
            const testsScore = testStatus === 'success' ? 6 : 0;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100
            });

            const docsUpdated = files.some((f) =>
              ['docs/CHANGELOG_AUTO.md', 'docs/PR_SUMMARY.md'].includes(f.filename)
            );
            const docsScore = docsUpdated ? 2 : 0;

            const totalChanges = files.reduce((sum, f) => sum + (f.changes || 0), 0);
            const smallDiff = totalChanges <= 200;
            const diffScore = smallDiff ? 2 : 0;

            const total = testsScore + docsScore + diffScore;
            const marker = '<!-- ai-pr-grade -->';

            const body = `${marker}
            ## PR Automation Grade: ${total}/10

            - Tests pass (6): ${testsScore}/6
            - Docs updated (2): ${docsScore}/2
            - Small diff (2, <= 200 changed lines): ${diffScore}/2

            Result details:
            - Test status: ${testStatus}
            - Total changed lines: ${totalChanges}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const previous = comments.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }

            if (testsScore === 0) {
              core.setFailed('Tests are failing, grade reduced.');
            }
