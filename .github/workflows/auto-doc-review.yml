name: AI PR Auto Documentation + Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-doc-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR documentation via OpenAI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          python3 << 'PYEOF'
          import os, json, subprocess, urllib.request, urllib.error

          api_key = os.environ["OPENAI_API_KEY"]
          base_sha = os.environ.get("BASE_SHA", "HEAD~1")
          head_sha = os.environ.get("HEAD_SHA", "HEAD")

          diff = subprocess.run(
              ["git", "diff", f"{base_sha}...{head_sha}"],
              capture_output=True, text=True
          ).stdout[:10000] or "No diff available."

          system_prompt = open(".codex/prompts/review-doc.prompt.md").read()

          def call_openai(user_msg):
              payload = json.dumps({
                  "model": "gpt-4o-mini",
                  "messages": [
                      {"role": "system", "content": system_prompt},
                      {"role": "user", "content": user_msg}
                  ]
              }).encode()
              req = urllib.request.Request(
                  "https://api.openai.com/v1/chat/completions",
                  data=payload,
                  headers={
                      "Authorization": f"Bearer {api_key}",
                      "Content-Type": "application/json"
                  }
              )
              with urllib.request.urlopen(req, timeout=60) as resp:
                  return json.loads(resp.read())["choices"][0]["message"]["content"]

          os.makedirs("docs", exist_ok=True)

          summary = call_openai(
              f"Generate the docs/PR_SUMMARY.md content for this pull request diff:\n\n{diff}"
          )
          open("docs/PR_SUMMARY.md", "w").write(summary)
          print("docs/PR_SUMMARY.md written.")

          changelog = call_openai(
              f"Generate the docs/CHANGELOG_AUTO.md content for this pull request diff:\n\n{diff}"
          )
          open("docs/CHANGELOG_AUTO.md", "w").write(changelog)
          print("docs/CHANGELOG_AUTO.md written.")
          PYEOF

      - name: Commit generated docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update PR summary and changelog"
          file_pattern: docs/CHANGELOG_AUTO.md docs/PR_SUMMARY.md

      - name: Comment PR summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'docs/PR_SUMMARY.md';
            const summary = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8').trim()
              : 'PR summary could not be generated.';

            const marker = '<!-- ai-pr-auto-doc-summary -->';
            const body = `${marker}\n## AI PR Summary\n\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const existing = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const prior = existing.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (prior) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: prior.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
