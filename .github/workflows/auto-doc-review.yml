name: AI PR Auto Documentation + Review

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-doc-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Codex review and documentation
        uses: openai/codex-action@v1
        with:
          prompt-file: .codex/prompts/review-doc.prompt.md
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Ensure documentation files exist
        run: |
          mkdir -p docs
          touch docs/CHANGELOG_AUTO.md docs/PR_SUMMARY.md

      - name: Commit generated docs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update PR summary and changelog"
          file_pattern: docs/CHANGELOG_AUTO.md docs/PR_SUMMARY.md

      - name: Comment PR summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'docs/PR_SUMMARY.md';
            const summary = fs.existsSync(path)
              ? fs.readFileSync(path, 'utf8').trim()
              : 'PR summary could not be generated.';

            const marker = '<!-- ai-pr-auto-doc-summary -->';
            const body = `${marker}\n## AI PR Summary\n\n${summary}`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const existing = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const prior = existing.find((c) =>
              c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (prior) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: prior.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
